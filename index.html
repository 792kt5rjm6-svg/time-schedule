<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日別管理アプリ</title>
  <style>
    :root {
      --main: #14b8c4;
      --main-dark: #0f8f99;
      --bg: #f2fbfc;
      --card: #ffffff;
      --text: #17323a;
      --muted: #6b7c83;
      --line: #d9eef1;
      --danger: #ef4444;
      --shadow: 0 10px 30px rgba(15, 143, 153, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(20,184,196,0.18), transparent 35%),
        linear-gradient(180deg, #f7feff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 22px 18px 10px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .app-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0.04em;
    }

    .today-badge {
      background: rgba(20, 184, 196, 0.12);
      color: var(--main-dark);
      border: 1px solid rgba(20, 184, 196, 0.24);
      border-radius: 999px;
      padding: 8px 13px;
      font-weight: 700;
      font-size: 13px;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 18px 40px;
      display: grid;
      grid-template-columns: 330px 1fr;
      gap: 18px;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(10px);
    }

    .goal-card {
      grid-column: 1 / -1;
      border: 2px solid rgba(20,184,196,0.22);
    }

    label {
      display: block;
      font-weight: 800;
      margin-bottom: 8px;
      font-size: 14px;
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 13px;
      font-size: 15px;
      background: #ffffff;
      color: var(--text);
      outline: none;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--main);
      box-shadow: 0 0 0 4px rgba(20,184,196,0.12);
    }

    textarea {
      resize: vertical;
      min-height: 88px;
      line-height: 1.6;
    }

    .goal-area {
      min-height: 105px;
      font-size: 16px;
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .month-title {
      font-weight: 900;
      font-size: 18px;
    }

    button {
      border: none;
      background: var(--main);
      color: white;
      border-radius: 13px;
      padding: 10px 12px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    .ghost {
      background: #e8f8fa;
      color: var(--main-dark);
    }

    .danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 7px;
      text-align: center;
    }

    .day-name {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      padding: 5px 0;
    }

    .date-cell {
      min-height: 42px;
      border-radius: 13px;
      border: 1px solid var(--line);
      background: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: var(--text);
      cursor: pointer;
      position: relative;
    }

    .date-cell.other {
      opacity: 0.35;
    }

    .date-cell.selected {
      background: var(--main);
      color: white;
      border-color: var(--main);
    }

    .date-cell.has-data::after {
      content: "";
      position: absolute;
      bottom: 6px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--main);
    }

    .date-cell.selected.has-data::after {
      background: white;
    }

    .sleep-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }

    .selected-date {
      font-weight: 900;
      font-size: 21px;
      margin: 0 0 12px;
    }

    .small-text {
      font-size: 13px;
      color: var(--muted);
      margin: 8px 0 0;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 14px 0;
    }

    .schedule-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }

    .schedule-row {
      display: grid;
      grid-template-columns: 96px 1fr 44px;
      gap: 10px;
      align-items: center;
      background: #f8feff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
    }

    .schedule-row input[type="time"] {
      padding: 10px 8px;
    }

    .schedule-row input[type="text"] {
      padding: 10px 11px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      background: #f8feff;
      border: 1px dashed #bfe8ed;
      border-radius: 16px;
      padding: 24px 10px;
      margin-top: 12px;
    }

    .save-status {
      color: var(--main-dark);
      font-weight: 800;
      font-size: 13px;
      margin-top: 10px;
    }

    .export-box {
      display: grid;
      gap: 10px;
    }

    @media (max-width: 850px) {
      main {
        grid-template-columns: 1fr;
      }

      .schedule-row {
        grid-template-columns: 88px 1fr 40px;
      }

      h1 {
        font-size: 23px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="app-title">
      <h1>日別管理アプリ</h1>
      <div class="today-badge" id="todayBadge"></div>
    </div>
  </header>

  <main>
    <section class="card goal-card">
      <label for="goal">今日の目標</label>
      <textarea id="goal" class="goal-area" placeholder="例：午前中に課題を終わらせる。弓道は会で伸び合いを止めない。"></textarea>
      <p class="save-status" id="saveStatus">自動保存されます</p>
    </section>

    <aside class="side">
      <section class="card">
        <div class="calendar-head">
          <button class="ghost" id="prevMonth">←</button>
          <div class="month-title" id="monthTitle"></div>
          <button class="ghost" id="nextMonth">→</button>
        </div>
        <div class="calendar-grid" id="calendar"></div>
        <p class="small-text">点がついている日は、目標・睡眠時間・予定のどれかが保存されています。</p>
      </section>

      <section class="card">
        <h2 style="margin:0 0 12px;font-size:18px;">データ管理</h2>
        <div class="export-box">
          <button class="ghost" id="exportData">バックアップを書き出す</button>
          <button class="danger" id="clearDate">この日のデータを削除</button>
        </div>
        <p class="small-text">データはこの端末のブラウザ内に保存されます。GitHub Pagesに置いてもログインなしで使えます。</p>
      </section>
    </aside>

    <section class="card">
      <p class="selected-date" id="selectedDateText"></p>

      <div class="sleep-grid">
        <div>
          <label for="wakeTime">起床時間</label>
          <input type="time" id="wakeTime" />
        </div>
        <div>
          <label for="bedTime">就寝時間</label>
          <input type="time" id="bedTime" />
        </div>
      </div>

      <div class="toolbar">
        <button id="makeSchedule">起床〜就寝で1時間ごとに作成</button>
        <button class="ghost" id="addRow">予定を1行追加</button>
        <button class="ghost" id="sortRows">時間順に並べる</button>
      </div>

      <label>タイムスケジュール</label>
      <div id="scheduleList" class="schedule-list"></div>
      <div id="emptyMessage" class="empty">まだ予定がありません。起床・就寝時間を入れて「1時間ごとに作成」を押してください。</div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "daily-management-app-v1";

    const goalEl = document.getElementById("goal");
    const wakeEl = document.getElementById("wakeTime");
    const bedEl = document.getElementById("bedTime");
    const scheduleListEl = document.getElementById("scheduleList");
    const emptyMessageEl = document.getElementById("emptyMessage");
    const selectedDateTextEl = document.getElementById("selectedDateText");
    const monthTitleEl = document.getElementById("monthTitle");
    const calendarEl = document.getElementById("calendar");
    const saveStatusEl = document.getElementById("saveStatus");
    const todayBadgeEl = document.getElementById("todayBadge");

    const today = new Date();
    let selectedDate = toDateKey(today);
    let viewYear = today.getFullYear();
    let viewMonth = today.getMonth();

    let appData = loadData();

    function toDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatDateJa(dateKey) {
      const [y, m, d] = dateKey.split("-").map(Number);
      const date = new Date(y, m - 1, d);
      const week = ["日", "月", "火", "水", "木", "金", "土"][date.getDay()];
      return `${y}年${m}月${d}日（${week}）`;
    }

    function loadData() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
      saveStatusEl.textContent = "保存しました";
      clearTimeout(window.saveTimer);
      window.saveTimer = setTimeout(() => {
        saveStatusEl.textContent = "自動保存されます";
      }, 1200);
      renderCalendar();
    }

    function getCurrentDayData() {
      if (!appData[selectedDate]) {
        appData[selectedDate] = {
          goal: "",
          wakeTime: "",
          bedTime: "",
          schedule: []
        };
      }
      return appData[selectedDate];
    }

    function hasDayData(dateKey) {
      const d = appData[dateKey];
      if (!d) return false;
      return Boolean(
        (d.goal && d.goal.trim()) ||
        d.wakeTime ||
        d.bedTime ||
        (d.schedule && d.schedule.some(item => item.time || item.task))
      );
    }

    function loadSelectedDate() {
      const data = getCurrentDayData();
      selectedDateTextEl.textContent = formatDateJa(selectedDate);
      goalEl.value = data.goal || "";
      wakeEl.value = data.wakeTime || "";
      bedEl.value = data.bedTime || "";
      renderSchedule();
      renderCalendar();
    }

    function updateCurrentData() {
      const data = getCurrentDayData();
      data.goal = goalEl.value;
      data.wakeTime = wakeEl.value;
      data.bedTime = bedEl.value;
      saveData();
    }

    function renderCalendar() {
      calendarEl.innerHTML = "";

      const monthNames = `${viewYear}年 ${viewMonth + 1}月`;
      monthTitleEl.textContent = monthNames;

      ["日", "月", "火", "水", "木", "金", "土"].forEach(day => {
        const div = document.createElement("div");
        div.className = "day-name";
        div.textContent = day;
        calendarEl.appendChild(div);
      });

      const firstDay = new Date(viewYear, viewMonth, 1);
      const startDate = new Date(viewYear, viewMonth, 1 - firstDay.getDay());

      for (let i = 0; i < 42; i++) {
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + i);
        const dateKey = toDateKey(date);

        const cell = document.createElement("div");
        cell.className = "date-cell";
        if (date.getMonth() !== viewMonth) cell.classList.add("other");
        if (dateKey === selectedDate) cell.classList.add("selected");
        if (hasDayData(dateKey)) cell.classList.add("has-data");

        cell.textContent = date.getDate();
        cell.addEventListener("click", () => {
          selectedDate = dateKey;
          viewYear = date.getFullYear();
          viewMonth = date.getMonth();
          loadSelectedDate();
        });

        calendarEl.appendChild(cell);
      }
    }

    function renderSchedule() {
      const data = getCurrentDayData();
      scheduleListEl.innerHTML = "";

      if (!data.schedule || data.schedule.length === 0) {
        emptyMessageEl.style.display = "block";
        return;
      }

      emptyMessageEl.style.display = "none";

      data.schedule.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "schedule-row";

        const time = document.createElement("input");
        time.type = "time";
        time.value = item.time || "";
        time.addEventListener("input", () => {
          data.schedule[index].time = time.value;
          saveData();
        });

        const task = document.createElement("input");
        task.type = "text";
        task.placeholder = "予定・やることを書く";
        task.value = item.task || "";
        task.addEventListener("input", () => {
          data.schedule[index].task = task.value;
          saveData();
        });

        const del = document.createElement("button");
        del.className = "danger";
        del.textContent = "×";
        del.title = "削除";
        del.addEventListener("click", () => {
          data.schedule.splice(index, 1);
          saveData();
          renderSchedule();
        });

        row.appendChild(time);
        row.appendChild(task);
        row.appendChild(del);
        scheduleListEl.appendChild(row);
      });
    }

    function makeHourlySchedule() {
      const data = getCurrentDayData();
      const wake = wakeEl.value;
      const bed = bedEl.value;

      if (!wake || !bed) {
        alert("起床時間と就寝時間を両方入力してください。");
        return;
      }

      const [wakeHour, wakeMin] = wake.split(":").map(Number);
      const [bedHour, bedMin] = bed.split(":").map(Number);

      let start = wakeHour * 60 + wakeMin;
      let end = bedHour * 60 + bedMin;

      if (end <= start) end += 24 * 60;

      const newSchedule = [];
      for (let t = start; t <= end; t += 60) {
        const dayMinutes = t % (24 * 60);
        const h = Math.floor(dayMinutes / 60);
        const m = dayMinutes % 60;
        newSchedule.push({
          time: `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`,
          task: ""
        });
      }

      data.schedule = newSchedule;
      updateCurrentData();
      renderSchedule();
    }

    function addScheduleRow() {
      const data = getCurrentDayData();
      data.schedule.push({ time: "", task: "" });
      saveData();
      renderSchedule();
    }

    function sortScheduleRows() {
      const data = getCurrentDayData();
      data.schedule.sort((a, b) => (a.time || "99:99").localeCompare(b.time || "99:99"));
      saveData();
      renderSchedule();
    }

    goalEl.addEventListener("input", updateCurrentData);
    wakeEl.addEventListener("input", updateCurrentData);
    bedEl.addEventListener("input", updateCurrentData);

    document.getElementById("prevMonth").addEventListener("click", () => {
      viewMonth--;
      if (viewMonth < 0) {
        viewMonth = 11;
        viewYear--;
      }
      renderCalendar();
    });

    document.getElementById("nextMonth").addEventListener("click", () => {
      viewMonth++;
      if (viewMonth > 11) {
        viewMonth = 0;
        viewYear++;
      }
      renderCalendar();
    });

    document.getElementById("makeSchedule").addEventListener("click", makeHourlySchedule);
    document.getElementById("addRow").addEventListener("click", addScheduleRow);
    document.getElementById("sortRows").addEventListener("click", sortScheduleRows);

    document.getElementById("clearDate").addEventListener("click", () => {
      if (!confirm(`${formatDateJa(selectedDate)} のデータを削除しますか？`)) return;
      delete appData[selectedDate];
      saveData();
      loadSelectedDate();
    });

    document.getElementById("exportData").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(appData, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "daily-management-backup.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    todayBadgeEl.textContent = `今日：${formatDateJa(toDateKey(today))}`;

    loadSelectedDate();
  </script>
</body>
</html>
